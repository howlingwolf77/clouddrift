# CloudDrift CI Pipeline
#
# Runs on every push to dev and main, and on every pull request to main.
# Three sequential jobs: lint → test → docker-build.
# Each job only runs when the previous one passes.
#
# Environment: ubuntu-latest (Linux), Python 3.13, uv package manager.
# Model artifacts are NOT available in CI — integration tests that require
# them are guarded with @pytest.mark.skipif(not ARTIFACTS_EXIST, ...).

name: CloudDrift CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]

env:
  # Silence the Streamlit first-run email prompt during any import
  DISABLE_STREAMLIT_ONBOARDING: "true"
  # Tell ALL uv commands (uv sync, uv run, etc.) to accept any 3.13.x
  # Python from the system PATH. Without this, uv reads .python-version
  # (which pins to 3.13.12) and rejects the runner's Python 3.13.14.
  UV_PYTHON: "3.13"
  UV_SYSTEM_PYTHON: "1"

jobs:

  # ---------------------------------------------------------------------------
  # Job 1: Ruff lint and format check
  # Fast — typically < 30 seconds. Fails fast on style issues.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      
      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.26"
          enable-cache: true

      - name: Verify Python and uv
        run:
          python --version
          which python
          uv --version
          uv python list

      - name: Install dependencies
        # Dev dependencies must be included — ruff is a dev dependency
        run: uv sync --frozen --python 3.13

      - name: Ruff — lint check
        run: uv run ruff check .

      - name: Ruff — format check
        run: uv run ruff format --check .

  # ---------------------------------------------------------------------------
  # Job 2: pytest test suite
  # Runs after lint passes. Integration tests requiring model artifacts
  # are skipped automatically via @pytest.mark.skipif(not ARTIFACTS_EXIST).
  # ---------------------------------------------------------------------------
  test:
    name: Test (pytest)
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      
      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.26"
          enable-cache: true

      - name: Verify Python and uv
        run:
          python --version
          which python
          uv --version
          uv python list

      - name: Install dependencies
        # --no-dev omits test/lint tools from the install but they are
        # included by default (dev group). Keep them for pytest.
        run: uv sync --frozen --python 3.13

      - name: Run pytest
        run: uv run pytest tests/ -q --tb=short
        env:
          # Ensures src/ is on the Python path for 'from src.models...' imports.
          # pyproject.toml already sets pythonpath=["."] for pytest, but
          # explicit here for clarity.
          PYTHONPATH: .

  # ---------------------------------------------------------------------------
  # Job 3: Docker build validation
  # Runs after test passes. Confirms the Dockerfile still builds cleanly.
  # First run takes ~10 minutes (PyTorch download). Subsequent runs are
  # faster via GitHub's Docker layer cache.
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build (compose)
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Validate Docker build
        run: docker compose build
        env:
          DOCKER_BUILDKIT: 1
